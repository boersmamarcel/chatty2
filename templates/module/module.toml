[module]
name = "{{project-name}}"
version = "0.1.0"
description = "{{description}}"
wasm = "{{project-name | snake_case}}.wasm"

[capabilities]
tools = []
chat = true
agent = true

[capabilities.host-imports]
process = false
http = false

[protocols]
openai_compat = true
mcp = true
a2a = true

[resources]
max_memory_mb = 32
max_execution_ms = 5000
