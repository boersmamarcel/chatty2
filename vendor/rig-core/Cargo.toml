[package]
name = "rig-core"
version = "0.31.0"
edition = "2024"
license = "MIT"
readme = "README.md"
description = "An opinionated library for building LLM powered applications."
repository = "https://github.com/0xPlaygrounds/rig"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lib]
name = "rig"
path = "src/lib.rs"
doctest = false

[dependencies]
as-any = "0.3.2"
async-stream = "0.3.6"
base64 = "0.22.1"
bytes = "1.10.1"
epub = { version = "2.1.4", optional = true }
futures = "0.3.31"
glob = "0.3.2"
lopdf = { version = "0.36.0", optional = true }
mime_guess = "2.0.5"
ordered-float = "5.0.0"
quick-xml = { version = "0.38.0", optional = true }
rayon = { version = "1.10.0", optional = true }
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "multipart"] }
rig-derive = { version = "0.1.10", optional = true }
schemars = "1.0.4"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tracing = "0.1.41"
url = "2.5"
rmcp = { version = "0.16", optional = true, features = ["client"] }
tokio = { version = "1.45.1", features = ["rt", "sync"] }
http = "1.3.1"
tracing-futures = { version = "0.2.5", features = ["futures-03"] }
serenity = { version = "0.12.4", optional = true }
fastrand = "2.3.0"
nanoid = "0.4"
getrandom = { version = "0.2", optional = true }
eventsource-stream = "0.2.3"
pin-project-lite = "0.2.16"
futures-timer = "3.0.3"
wasm-bindgen-futures = { version = "0.4.54", optional = true }
mime = "0.3.17"
reqwest-middleware = { version = "0.5.1", optional = true, features = [
  "json",
  "multipart",
  "charset",
  "http2",
] }

[dev-dependencies]
anyhow = "1.0.98"
assert_fs = "1.1.3"
tokio = { version = "1.45.1", features = ["full"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
tokio-test = "0.4.4"
serde_path_to_error = "0.1.17"
base64 = "0.22.1"

[features]
default = ["reqwest-rustls"]
all = ["derive", "pdf", "rayon"]
audio = []
image = []
derive = ["dep:rig-derive"]
experimental = []
discord-bot = ["dep:serenity"]
pdf = ["dep:lopdf"]
epub = ["dep:epub", "dep:quick-xml"]
rayon = ["dep:rayon"]
wasm = [
  "dep:wasm-bindgen-futures",
  "futures-timer/wasm-bindgen",
  "getrandom/js",
]
rmcp = ["dep:rmcp"]
socks = ["reqwest/socks"]
reqwest-native-tls = ["reqwest/native-tls"]
reqwest-rustls = [
  "reqwest/rustls",
  "reqwest/charset",
  "reqwest/http2",
  "reqwest/system-proxy",
]
reqwest-middleware = ["dep:reqwest-middleware"]
reqwest-middleware-rustls = ["reqwest-middleware", "reqwest-middleware/rustls"]
