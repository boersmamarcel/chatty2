[package]
name = "rig-core"
version = "0.31.0"
edition = "2024"
license = "MIT"
readme = "README.md"
description = "An opinionated library for building LLM powered applications."
repository = "https://github.com/0xPlaygrounds/rig"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.clippy]
dbg_macro = "forbid"
todo = "forbid"
unimplemented = "forbid"

[lib]
name = "rig"
path = "src/lib.rs"
doctest = false

[dependencies]
as-any = "0.3.2"
async-stream = "0.3.6"
base64 = "0.22.1"
bytes = "1.10.1"
epub = { version = "2.1.4", optional = true }
futures = "0.3.31"
glob = "0.3.2"
lopdf = { version = "0.36.0", optional = true }
mime_guess = "2.0.5"
ordered-float = "5.0.0"
quick-xml = { version = "0.38.0", optional = true }
rayon = { version = "1.10.0", optional = true }
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "multipart"] }
rig-derive = { version = "0.1.10", path = "../rig-derive", optional = true }
schemars = "1.0.4"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tracing = "0.1.41"
url = "2.5"
rmcp = { version = "1.1.0", optional = true, features = ["client"] }
tokio = { version = "1.45.1", features = ["rt", "sync"] }
http = "1.3.1"
tracing-futures = { version = "0.2.5", features = ["futures-03"] }
serenity = { version = "0.12.4", optional = true }
fastrand = "2.3.0"
nanoid = "0.4"
getrandom = { version = "0.2", optional = true }
eventsource-stream = "0.2.3"
pin-project-lite = "0.2.16"
futures-timer = "3.0.3"
wasm-bindgen-futures = { version = "0.4.54", optional = true }
mime = "0.3.17"
reqwest-middleware = { version = "0.5.1", optional = true, features = [
  "json",
  "multipart",
  "charset",
  "http2",
] }

[dev-dependencies]
anyhow = "1.0.98"
assert_fs = "1.1.3"
tokio = { version = "1.45.1", features = ["full"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
tokio-test = "0.4.4"
redis = { version = "1.0.2", features = ["tokio-comp", "aio", "vector-sets"] }
serde_path_to_error = "0.1.17"
base64 = "0.22.1"
reqwest-retry = { version = "0.9" }
reqwest-middleware = { version = "0.5", features = [
  "json",
  "multipart",
  "charset",
  "http2",
] }

# Required for `rmcp` example
hyper-util = { version = "0.1.14", features = ["service", "server"] }
rmcp = { version = "1.1.0", features = [
  "client",
  "macros",
  "reqwest",                                  # required for some strange reason
  "transport-streamable-http-client",
  "transport-streamable-http-client-reqwest",
  "transport-streamable-http-server-session",
  "transport-streamable-http-server",
  "transport-worker",
] }
axum = "0.8.4"

# required for otel
opentelemetry = "0.30.0"
opentelemetry_sdk = { version = "0.30.0", features = ["rt-tokio"] }
opentelemetry-otlp = "0.30.0"
tracing-opentelemetry = "0.31.0"


[features]
default = ["reqwest-rustls"]
all = ["derive", "pdf", "rayon"]
audio = []
image = []
derive = ["dep:rig-derive"]
experimental = []
discord-bot = ["dep:serenity"]
pdf = ["dep:lopdf"]
epub = ["dep:epub", "dep:quick-xml"]
rayon = ["dep:rayon"]
wasm = [
  "dep:wasm-bindgen-futures",
  "futures-timer/wasm-bindgen",
  "getrandom/js",
]
rmcp = ["dep:rmcp"]
socks = ["reqwest/socks"]
reqwest-native-tls = ["reqwest/native-tls"]
reqwest-rustls = [
  "reqwest/rustls",
  "reqwest/charset",
  "reqwest/http2",
  "reqwest/system-proxy",
]
reqwest-middleware = ["dep:reqwest-middleware"]
reqwest-middleware-rustls = ["reqwest-middleware", "reqwest-middleware/rustls"]

[[test]]
name = "embed_macro"
required-features = ["derive"]

[[example]]
name = "rag"
required-features = ["derive"]

[[example]]
name = "reqwest_middleware"
required-features = ["reqwest-middleware"]

[[example]]
name = "rag_ollama"
required-features = ["derive"]

[[example]]
name = "vector_search"
required-features = ["derive"]

[[example]]
name = "vector_search_cohere"
required-features = ["derive"]

[[example]]
name = "gemini_embeddings"
required-features = ["derive"]

[[example]]
name = "agent_with_moonshot"

[[example]]
name = "pdf_agent"
required-features = ["derive", "pdf"]

[[example]]
name = "agent_with_together"
required-features = ["derive"]

[[example]]
name = "together_embeddings"
required-features = ["derive"]

[[example]]
name = "openai_audio_generation"
required-features = ["audio"]

[[example]]
name = "hyperbolic_audio_generation"
required-features = ["audio"]

[[example]]
name = "mistral_embeddings"
required-features = ["derive"]

[[example]]
name = "voyageai_embeddings"
required-features = ["derive"]

[[example]]
name = "rmcp"
required-features = ["rmcp"]

[[example]]
name = "request_hook"

[[example]]
name = "discord_bot"
required-features = ["discord-bot"]

[[example]]
name = "custom_vector_store"
