[workspace]
resolver = "3"
members = [
    "rig-core",
    "rig-derive",
]

[workspace.lints.clippy]
dbg_macro = "forbid"
todo = "forbid"
unimplemented = "forbid"

[workspace.package]
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.98"
as-any = "0.3.2"
assert_fs = "1.1.3"
async-stream = "0.3.6"
base64 = "0.22.1"
bytes = "1.10.1"
convert_case = "0.8.0"
deluxe = "0.5.0"
epub = "2.1.4"
futures = "0.3.31"
glob = "0.3.2"
indoc = "2.0.6"
lopdf = "0.36.0"
mime_guess = "2.0.5"
nanoid = "0.4"
ordered-float = "5.0.0"
proc-macro2 = "1.0.95"
quick-xml = "0.38.0"
quote = "1.0.40"
rayon = "1.10.0"
reqwest = { version = "0.13", default-features = false }
schemars = "1.0.4"
serde = "1.0.219"
serde_json = "1.0.140"
serde_path_to_error = "0.1.17"
syn = "2.0.104"
thiserror = "2.0.12"
tokio = "1.45.1"
tokio-test = "0.4.4"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
url = "2.5"
