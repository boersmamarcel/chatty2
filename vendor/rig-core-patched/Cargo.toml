    "dep:reqwest-middleware",
    "native-tls",
    "reqwest/native-tls",
]
reqwest-middleware-rustls = [
    "dep:reqwest-middleware",
    "rustls",
    "reqwest-middleware/rustls",
]
rmcp = ["dep:rmcp"]
